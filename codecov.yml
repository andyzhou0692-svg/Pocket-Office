coverage:
  precision: 2
  round: down
  range: "40...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: true

comment:
  layout: "condensed_header, diff, files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

ignore:
  - "scripts/"
  - "docs/"
  - "*.md"
