coverage:
  precision: 2
  round: down
  range: "40...100"

  status:
    project:
      default:
        target: auto
        threshold: 5%
        informational: true
    patch:
      default:
        target: 70%
        threshold: 5%
        informational: true

# Per-crate coverage VIEWS over the one workspace upload (a virtual split — no
# extra CI jobs / flags / uploads). Turns the single blended % into the DAG's
# topology (pixtuoid-core ← pixtuoid-scene ← pixtuoid + the standalone hook), so a
# regression in one crate can't hide behind the binary's untestable TTY paths the
# `ignore` list already drops. Non-blocking (`informational`) to match the
# top-level statuses — these are a lens, not a gate. The global `ignore` above
# still applies, so the `pixtuoid` view counts only its headless-testable files.
component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 5%
        informational: true
  individual_components:
    - component_id: core
      name: pixtuoid-core
      paths: ["crates/pixtuoid-core/**"]
    - component_id: scene
      name: pixtuoid-scene
      paths: ["crates/pixtuoid-scene/**"]
    - component_id: binary
      name: pixtuoid
      paths: ["crates/pixtuoid/**"]
    - component_id: hook
      name: pixtuoid-hook
      paths: ["crates/pixtuoid-hook/**"]

comment:
  layout: "condensed_header, diff, components, files"
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

ignore:
  - "scripts/"
  - "docs/"
  - "*.md"
  # Not coverable headlessly — exercising these needs a real TTY / OS / display:
  - "crates/pixtuoid/src/main.rs"               # binary entry: terminal raw-mode, crash hook, signal handling
  - "crates/pixtuoid/src/tui/mod.rs"            # crossterm event loop + terminal lifecycle: reads/writes the real TTY
  - "crates/pixtuoid/src/runtime/driver.rs"     # async glue: tokio runtime + block_on + ctrl_c + socket bind (#103)
  - "crates/pixtuoid/src/floating/mod.rs"       # floating run(): tokio runtime + winit EventLoop glue (the floating twin of driver.rs)
  - "crates/pixtuoid/src/floating/window.rs"    # winit ApplicationHandler: creates the real OS window + softbuffer surface
  # The testable floating logic IS counted: offscreen.rs (render seam) + geometry.rs (window/monitor rect math).
  # Keeps the % honest: "of the code we CAN test headlessly, X% is tested",
  # rather than dragging the number down with paths no test can reach.
