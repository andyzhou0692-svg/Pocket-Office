name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch: # manual re-run of the full matrix (mutants has its own workflow)

concurrency:
  group: ci-${{ github.ref }}
  # Cancel superseded PR runs (push-over-push), but NEVER cancel an in-flight
  # main run — back-to-back merges would otherwise abort each other's CI
  # verdict + Codecov upload. Main runs are cheap and rare; let them finish.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: extractions/setup-just@v4
      - run: just fmt-check
      - run: just arch

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      # prefix-key v1: the [profile.dev] change (line-tables-only / deps
      # debug=false) altered dep fingerprints, but rust-cache's key (lockfile
      # hash) still FULL-MATCHED the stale v0 caches — and a full-match restore
      # suppresses the post-job save, so every run recompiled deps and never
      # replaced the cache. Bumping the prefix forces fresh keys + saves.
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
      - uses: extractions/setup-just@v4
      - run: just clippy

  # The wasm office (pixtuoid-web) must keep COMPILING for wasm32 — `just hack`
  # checks the no-default-features graph on the HOST target only, so a core
  # change that breaks the wasm build (a target-gated dep, a syscall outside
  # the `native` gate) would otherwise surface only when someone next runs
  # `just gen-wasm` locally. Build-only on purpose: NO byte-compare against
  # the committed site/public/wasm/ artifact (wasm output drifts across rustc
  # versions and this job installs latest stable — freshness stays a local
  # `just gen-wasm` + review concern, like the committed demo media).
  wasm-check:
    name: wasm-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust
      - uses: extractions/setup-just@v4
      # gen-wasm compiles through this same shared recipe (wasm-build) — one build
      # line, so what CI checks can't drift from what gen-wasm ships.
      - run: just wasm-build
      # The committed artifact's size cap (deterministic — a stat on the
      # checked-in blob, no toolchain drift; the byte-exact rebuild compare
      # stays deliberately un-CI'd).
      - run: just gen-wasm-check

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # Advisories run daily in audit.yml; this PR gate checks the rest.
          # Keep in sync with the justfile `deny` recipe.
          command: check bans licenses sources

  machete:
    name: unused deps
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # No rust-toolchain: cargo-machete parses Cargo.toml, it never compiles.
      - uses: taiki-e/install-action@cargo-machete
      - uses: extractions/setup-just@v4
      - run: just machete

  hygiene:
    name: hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # The ONE lightweight home for the non-Rust hygiene linters — single Go/Rust
      # binaries that need no Rust toolchain, so they share a job instead of one
      # boilerplate job each. shfmt + actionlint via the runner's preinstalled Go
      # (pinned to `just setup-tools`); lychee via taiki-e/install-action (the
      # repo's prebuilt-tool installer). actionlint shells out to shellcheck
      # (preinstalled on the runner) for its `run:`-block checks; lychee runs
      # `--offline` so the link check needs no network.
      - name: Install shfmt + actionlint
        run: |
          go install mvdan.cc/sh/v3/cmd/shfmt@v3.13.1
          go install github.com/rhysd/actionlint/cmd/actionlint@v1.7.12
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - uses: taiki-e/install-action@v2
        with:
          tool: lychee@0.24.2
      - uses: extractions/setup-just@v4
      - run: just shfmt-check
      - run: just actionlint
      - run: just links

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      # `just msrv` reads rust-version from Cargo.toml and self-installs that
      # pinned toolchain via the runner's rustup, so the floor lives in one place.
      # No rust-cache: it keys on the runner's stable, but this job builds on the
      # MSRV toolchain (different rustc fingerprint), so the target cache can't be
      # reused — a clean cold `cargo check` is the honest gate.
      - uses: extractions/setup-just@v4
      - run: just msrv

  notes-curated:
    name: release notes curated
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # No rust-toolchain: a grep guard against shipping uncurated release notes.
      - uses: extractions/setup-just@v4
      - run: just notes-curated

  npm-gen:
    name: npm package generator
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # No rust-toolchain: this only exercises the Node generator's unit test —
      # the same `just npm-check` release.yml gates `npm publish` on, run here at
      # PR time so a generate.mjs regression can't first surface at tag-push.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: extractions/setup-just@v4
      - run: just npm-check

  readme:
    name: readme drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      # No rust-toolchain, no npm ci: gen-readme.mjs is pure node:builtins. It
      # fails if the committed README drifted from site/src/*.json. Lives HERE
      # (not the path-filtered `site` workflow) because ci.yml runs on every PR —
      # so it's safe to mark required without deadlocking PRs that don't touch site/.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: extractions/setup-just@v4
      - run: just gen-readme-check

  hack:
    name: feature combinations
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust # see the clippy job's note
      - uses: taiki-e/install-action@cargo-hack
      - uses: extractions/setup-just@v4
      - run: just hack

  windows-check:
    name: windows-check
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust # see the clippy job's note
      - uses: extractions/setup-just@v4
      - run: just check-windows

  windows-test:
    name: windows-test
    # Unpinned back to windows-latest now the June 2026 VS2026-image migration has
    # settled. This job's own run validates the image on every PR — if it regresses,
    # re-pin to a dated runner label here.
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust # see the clippy job's note
      - uses: extractions/setup-just@v4
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - run: just test
        env:
          NEXTEST_PROFILE: ci
      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: target/nextest/ci/junit.xml
          report-type: test_results
          flags: windows
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  macos-test:
    name: macos-test
    # macOS is the primary dev/user platform (BSD CLI / launchd / ~/.config /
    # ~/.claude path behavior diverges from Linux) yet was previously untested in
    # CI — the homebrew-core submission was the first macOS build. macos-14 = Apple
    # Silicon (the modern default); the winit/softbuffer `floating` deps build
    # against the bundled SDK.
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust # see the clippy job's note
      - uses: extractions/setup-just@v4
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - run: just test
        env:
          NEXTEST_PROFILE: ci
      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: target/nextest/ci/junit.xml
          report-type: test_results
          flags: macos
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  semver:
    name: semver-checks
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust # see the clippy job's note
      - uses: taiki-e/install-action@cargo-semver-checks
      - uses: extractions/setup-just@v4
      - run: just semver

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust # see the clippy job's note
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: extractions/setup-just@v4
      - name: Generate coverage + JUnit XML (single test run)
        run: just coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: lcov.info
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: target/nextest/ci/junit.xml
          report-type: test_results
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  snapshots:
    name: snapshot hygiene
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust # see the clippy job's note
      - uses: taiki-e/install-action@cargo-nextest
      - uses: taiki-e/install-action@cargo-insta
      - uses: extractions/setup-just@v4
      # Runs the suite under nextest and fails on a pending OR unreferenced
      # (orphan) snapshot — the rot plain `cargo test` can't see. Separate from
      # the coverage job because cargo-insta needs an UNinstrumented run to track
      # which snapshots were referenced.
      - run: just snapshots

  # (mutation testing moved to its own on-demand workflow, mutants.yml — when it
  # lived here, dispatching it re-ran this entire matrix alongside it.)

  smoke:
    name: smoke
    # No `needs:` — smoke builds the release binary + renders + pixel-diffs; it
    # has no artifact/data dependency on fmt/clippy (they're independent gates).
    # Running it in parallel (vs gated behind lint) shaves latency on green PRs;
    # the only thing given up is fail-fast (a doomed PR still burns one smoke run).
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: v1-rust # see the clippy job's note
      - uses: extractions/setup-just@v4
      - name: Build release binaries + examples
        run: just build --release --bins --examples
      - name: pixtuoid --help exits 0
        run: ./target/release/pixtuoid --help
      - name: pixtuoid-hook exits 0 with no socket
        # Both halves of invariant #5's "always exit 0 SILENTLY", on the
        # RELEASE profile (the test suite covers the debug build): the
        # pipeline status is the shim's exit code (bash -e, no pipefail),
        # and any output at all fails the emptiness check.
        run: |
          out=$(echo '{}' | ./target/release/pixtuoid-hook 2>&1)
          test -z "$out"
          echo "hook shim exited 0 silently (expected no-op with no socket)"
      # (The install/uninstall round-trip is no longer a CLI command — binding a
      # source is the in-TUI Sources panel's job. The hook-write round-trip
      # against every target is unit-tested by
      # `install::tests::install_target_round_trips_every_registered_target`.)
      # gen-check renders the office (Pillow + ffmpeg) and diffs the committed
      # README sections + every still. node is for gen-readme-check. gifsicle is
      # NOT needed: --check presence-checks the gif/clip jobs (gen-media.py skips
      # them before any gifsicle call); ffmpeg IS required (the site `space` crop).
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install ffmpeg
        # apt mirrors on hosted runners intermittently STALL — the bare one-liner
        # hung past the job timeout → smoke "cancelled" (hit ~3×). Bound each fetch
        # (http/https Timeout) so a dead mirror fails FAST instead of hanging, let
        # apt retry transient fetches (Acquire::Retries), and retry the whole
        # install up to 3× with backoff (apt fails on its OWN timeout, releasing the
        # dpkg lock, so a retry is safe — no SIGKILL). Install the FULL ffmpeg (no
        # --no-install-recommends): the trim isn't part of the fix and would make a
        # future gen-check op silently depend on the recommends set being present.
        run: |
          apt_opts=(-o Acquire::Retries=3 -o Acquire::http::Timeout=30 -o Acquire::https::Timeout=30)
          for attempt in 1 2 3; do
            if sudo apt-get update "${apt_opts[@]}" \
              && sudo apt-get install -y "${apt_opts[@]}" ffmpeg; then
              # No `| head` — under `set -o pipefail` a closed pipe could SIGPIPE
              # ffmpeg and fail this success path. The full banner is fine in logs.
              ffmpeg -version
              exit 0
            fi
            echo "ffmpeg install attempt $attempt failed; retrying in $((attempt * 15))s..." >&2
            sleep "$((attempt * 15))"
          done
          echo "ffmpeg install failed after 3 attempts" >&2
          exit 1
      - name: Cache pip downloads
        # The venv itself is cheap to recreate; the wheel DOWNLOAD is the cost.
        # Cache ~/.cache/pip keyed on the pinned dep set so an unchanged
        # requirements-dev.txt reinstalls from cache instead of re-fetching PyPI.
        uses: actions/cache@v6
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-${{ hashFiles('requirements-dev.txt') }}
          restore-keys: pip-${{ runner.os }}-
      - name: Set up Python virtual environment
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt
      - name: Artifact-drift gate (README sections + all rendered stills)
        run: just gen-check
      - name: Upload gen-check diff overlays
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gen-check-diffs
          path: target/gen-check-diff/
          retention-days: 7
          if-no-files-found: ignore
