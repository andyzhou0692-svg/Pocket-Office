name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: extractions/setup-just@v4
      - run: just fmt-check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - run: just clippy

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2

  machete:
    name: unused deps
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # No rust-toolchain: cargo-machete parses Cargo.toml, it never compiles.
      - uses: taiki-e/install-action@cargo-machete
      - uses: extractions/setup-just@v4
      - run: just machete

  msrv:
    name: msrv
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # `just msrv` reads rust-version from Cargo.toml and self-installs that
      # pinned toolchain via the runner's rustup, so the floor lives in one place.
      # No rust-cache: it keys on the runner's stable, but this job builds on the
      # MSRV toolchain (different rustc fingerprint), so the target cache can't be
      # reused — a clean cold `cargo check` is the honest gate.
      - uses: extractions/setup-just@v4
      - run: just msrv

  notes-curated:
    name: release notes curated
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # No rust-toolchain: a grep guard against shipping uncurated release notes.
      - uses: extractions/setup-just@v4
      - run: just notes-curated

  npm-gen:
    name: npm package generator
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # No rust-toolchain: this only exercises the Node generator's unit test —
      # the same `just npm-check` release.yml gates `npm publish` on, run here at
      # PR time so a generate.mjs regression can't first surface at tag-push.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: extractions/setup-just@v4
      - run: just npm-check

  readme:
    name: readme drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      # No rust-toolchain, no npm ci: gen-readme.mjs is pure node:builtins. It
      # fails if the committed README drifted from site/src/*.json. Lives HERE
      # (not the path-filtered `site` workflow) because ci.yml runs on every PR —
      # so it's safe to mark required without deadlocking PRs that don't touch site/.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - uses: extractions/setup-just@v4
      - run: just gen-readme-check

  hack:
    name: feature combinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-hack
      - uses: extractions/setup-just@v4
      - run: just hack

  windows-check:
    name: windows-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - run: just check-windows

  windows-test:
    name: windows-test
    # Pinned to windows-2022 during the VS 2026 migration of windows-latest
    # (June 8-15, 2026); unpin once the migration settles (tracked carry-item).
    runs-on: windows-2022
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - run: just test

  semver:
    name: semver-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-semver-checks
      - uses: extractions/setup-just@v4
      - run: just semver

  coverage:
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Install cargo-nextest
        uses: taiki-e/install-action@cargo-nextest
      - uses: extractions/setup-just@v4
      - name: Generate coverage + JUnit XML (single test run)
        run: just coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
      - name: Upload test results to Codecov
        if: always()
        uses: codecov/codecov-action@v6
        with:
          files: target/nextest/ci/junit.xml
          report-type: test_results
          flags: unit
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  smoke:
    name: smoke
    needs: [fmt, clippy]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: extractions/setup-just@v4
      - name: Build release binaries + examples
        run: just build --release --bins --examples
      - name: pixtuoid --help exits 0
        run: ./target/release/pixtuoid --help
      - name: pixtuoid-hook exits 0 with no socket
        run: |
          echo '{}' | ./target/release/pixtuoid-hook || true
          echo "hook shim exited (expected silent no-op)"
      - name: install-hooks round-trip
        run: |
          mkdir -p /tmp/smoke-test/.claude
          echo '{}' > /tmp/smoke-test/.claude/settings.json
          HOME=/tmp/smoke-test ./target/release/pixtuoid install-hooks
          HOME=/tmp/smoke-test ./target/release/pixtuoid uninstall-hooks
      # gen-check renders the office (Pillow + ffmpeg + gifsicle) and diffs the
      # committed README sections + every still. node is for gen-readme-check.
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - name: Install ffmpeg + gifsicle
        run: sudo apt-get update && sudo apt-get install -y ffmpeg gifsicle
      - name: Set up Python virtual environment
        run: |
          python3 -m venv .venv
          .venv/bin/pip install -r requirements-dev.txt
      - name: Artifact-drift gate (README sections + all rendered stills)
        run: just gen-check
      - name: Upload gen-check diff overlays
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gen-check-diffs
          path: target/gen-check-diff/
          retention-days: 7
          if-no-files-found: ignore

