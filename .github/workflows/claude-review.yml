name: claude review

on:
  pull_request:
    # `synchronize` is deliberate: every push re-reviews (billed) — the owner
    # wants continuous review across a PR's commits. `/claude-review` (below)
    # remains as a manual re-trigger. The per-PR concurrency group cancels a
    # superseded in-flight review, so rapid pushes don't stack cost.
    types: [opened, reopened, ready_for_review, synchronize]
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write
  actions: read

jobs:
  review:
    if: >
      (github.event_name == 'pull_request' && github.actor != 'dependabot[bot]' && github.event.pull_request.draft == false && github.event.pull_request.head.repo.full_name == github.repository) ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request && contains(github.event.comment.body, '/claude-review') && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association))
    runs-on: ubuntu-latest
    timeout-minutes: 15
    concurrency:
      group: claude-review-${{ github.event.issue.number || github.event.pull_request.number }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Load review prompt
        id: prompt
        run: |
          {
            echo 'content<<PROMPT_EOF'
            cat .github/prompts/pr_review_rules.md
            echo 'PROMPT_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.prompt.outputs.content }}
          track_progress: true
          show_full_output: true
          claude_args: '--max-turns 60 --max-budget-usd 10 --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"'
