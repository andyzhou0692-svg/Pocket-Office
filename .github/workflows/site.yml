name: site

on:
  # PR-only gate. The on-main build + deploy is owned by pages.yml (which runs
  # `npm run lint && npm run check` itself), so building here on a main push too
  # was a redundant 2nd Astro build per push. Only `format:check` is unique to
  # this workflow — auto-fixable + caught on every PR (everything lands via PR).
  # site/ also renders ../Cargo.toml + ../docs/{CONFIGURATION,ARCHITECTURE,CONTRIBUTING,KNOWLEDGE-ENGINEERING,PARALLEL-DELIVERY}.md
  # (the mermaid block renders to an inline SVG at build). README drift from
  # site/src/*.json is gated by ci.yml's `readme` job — so README.md is NOT here.
  pull_request:
    paths: ['site/**', 'Cargo.toml', 'docs/CONFIGURATION.md', 'docs/ARCHITECTURE.md', 'docs/CONTRIBUTING.md', 'docs/KNOWLEDGE-ENGINEERING.md', 'docs/PARALLEL-DELIVERY.md', '.github/workflows/site.yml', '.github/workflows/pages.yml']

permissions:
  contents: read

concurrency:
  group: site-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: format · lint · types · build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: site
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - run: npm ci
      # cache the ~92MB Chromium across runs (keyed on the lockfile) so the install
      # below is a no-op on a hit
      - name: Cache Playwright Chromium
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}
      # the /architecture page renders its ```mermaid block to an inline SVG at
      # build via rehype-mermaid (Playwright) — needs a headless Chromium.
      - run: npx playwright install --with-deps chromium
      - run: npm run format:check
      - run: npm run lint
      - run: npm run check
      # knip: unused files / exports / dependencies in the Astro project (catches
      # an orphaned component or stale dep tsc/eslint can't see). Mirrors the
      # `verify` script; runs before build for fast feedback.
      - run: npm run knip
      # node:test unit tests (config/csp-hashes.test.mjs) — the CSP hash kernel's
      # edge cases the e2e watchdog can only catch indirectly. Part of `verify`.
      - run: npm run test:unit
      # deterministic ★ count for the e2e suite below (config/gh-stars.mjs
      # GH_STARS_OVERRIDE seam) — this runner's unauthenticated GitHub API call
      # would otherwise rate-limit to null and hide the star chip, silently
      # no-op-ing its assertion.
      - run: npm run build
        env:
          GH_STARS_OVERRIDE: 842
      # e2e smoke suite vs the PRODUCTION build just produced (astro preview,
      # the official Astro testing posture): pins the page's runtime contracts
      # — wasm office goes live, statusline truth-light, digit-key scrollspy,
      # dimmer release, Copy→hire wiring, docs-nav variant, reduced-motion
      # fallback — plus a console-error watchdog (it caught the CSP-blocked
      # inlined fonts on day one). Chromium is already installed above.
      - run: npm run e2e
      # Lighthouse CI: gate a11y / SEO / best-practices (perf advisory) against
      # the built pages — serves dist via `astro preview` (root `/` base on the
      # custom domain) and audits each. Replaces the dropped eslint-plugin-jsx-a11y with a
      # rendered-DOM a11y check (axe-powered) plus SEO/perf budgets. Uses the
      # runner's pre-installed Chrome (chrome-launcher finds it).
      - run: npm run lighthouse
      # Keep the full HTML reports even when the gate fails (the run logs only
      # carry the failing scores, not the element-level violations) — `path` is
      # workspace-root-relative, so it's prefixed with site/ despite the job cwd.
      - name: Upload Lighthouse reports
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: site/.lighthouseci/
          retention-days: 7
          if-no-files-found: ignore
