name: deploy site

on:
  # Redeploy when the inputs the build reads change: site/ itself, the version in
  # ../Cargo.toml, and the rendered docs ../docs/{CONFIGURATION,ARCHITECTURE,CONTRIBUTING,MIGRATION}.md
  # (the /config, /architecture, /contributing pages). Without these the published
  # site silently lags its own source.
  push:
    branches: [main]
    paths: ['site/**', 'Cargo.toml', 'docs/CONFIGURATION.md', 'docs/ARCHITECTURE.md', 'docs/CONTRIBUTING.md', 'docs/MIGRATION.md', '.github/workflows/pages.yml']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# one deploy at a time; don't cancel an in-flight publish
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json
      - name: Cache Playwright Chromium
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('site/package-lock.json') }}
      # withastro/action only runs `astro build`; gate the deploy on lint + types
      # too, so a build-clean but lint/typecheck-failing commit can't ship. Also
      # install Chromium here (same runner → cached) so withastro/action's build
      # can render the /architecture ```mermaid block to an inline SVG.
      - name: Validate (lint + types) + Chromium for the diagram
        working-directory: site
        run: npm ci && npm run lint && npm run check && npx playwright install --with-deps chromium
      - uses: withastro/action@v6
        # the ticker's build-time merged-PR fetch: unauthenticated quota on
        # shared runner IPs is routinely exhausted -> silent canned-reel
        # fallback; the ambient token (contents: read) gives real headroom
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          path: ./site
          node-version: 22
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
