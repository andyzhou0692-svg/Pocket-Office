name: upstream-drift

# Weekly watch for upstream wire-format renames (hook event names, transcript
# event types, the subagent-dispatch tool) across all registered sources. The
# Task -> Agent rename shipped undocumented and
# silently disabled subagent suppression; this surfaces the next one before a
# user hits it. See scripts/check_upstream_drift.py and the "Keeping the decode
# mapping current" section in crates/pixtuoid-core/CLAUDE.md.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:
  # On PRs that touch the watcher itself, run ONLY the selftest (the live network
  # check + issue-filing stay schedule/dispatch-only — a flaky upstream fetch must
  # never gate a PR). A parser/classifier regression IS caught here.
  pull_request:
    paths:
      - "scripts/check_upstream_drift*.py"
      - ".github/workflows/upstream-drift.yml"
      # The parsers read the wire constants out of these Rust sources, so a
      # rename/drop here (like the 0.12.0 `Task`->`Agent` dispatch-arm removal,
      # which quietly broke the self-test) must trip the selftest at PR time —
      # otherwise the break first surfaces in the weekly scheduled run.
      - "crates/pixtuoid-core/src/source/decoder.rs"
      - "crates/pixtuoid-core/src/source/opencode.rs"
      - "crates/pixtuoid-core/src/source/copilot.rs"
      # codex.rs: the drift parser reads its rollout `("event_msg"|"response_item", …)`
      # decode arms (checked vs upstream EventMsg/ResponseItem), so a refactor of
      # those arms must trip the selftest here, not only weekly.
      - "crates/pixtuoid-core/src/source/codex.rs"
      - "crates/pixtuoid/src/install/*.rs"

permissions:
  contents: read
  issues: write

jobs:
  drift:
    name: upstream wire-format drift
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: extractions/setup-just@v4

      # Always runs (incl. PRs): a parser/classifier regression = silent monitor
      # death, so guard it before the live check trusts the parsers. Through the
      # justfile recipe (repo rule: CI calls the same recipes as local dev).
      - name: Self-test the watcher
        run: just drift-selftest

      - name: Check upstream drift
        id: check
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          set +e
          python3 scripts/check_upstream_drift.py | tee drift-report.md
          echo "exit=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"

      - name: Open or update tracking issue
        if: steps.check.outputs.exit == '1'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh label create upstream-drift --color FBCA04 \
            --description "Upstream CLI wire-format drift" 2>/dev/null || true
          num=$(gh issue list --label upstream-drift --state open \
            --json number --jq '.[0].number // empty')
          if [ -n "$num" ]; then
            gh issue comment "$num" --body-file drift-report.md
          else
            gh issue create \
              --title "Upstream CLI wire-format drift detected" \
              --label upstream-drift \
              --body-file drift-report.md
          fi

      - name: Note transient check failure
        if: steps.check.outputs.exit == '2'
        run: echo "::warning::upstream-drift could not verify (transient network/HTTP); see report above."

      - name: Fail the run on confirmed drift
        if: steps.check.outputs.exit == '1'
        run: exit 1

      - name: Fail on an unexpected checker exit
        # exit 0 = no drift; 1 = confirmed drift (issue + fail above); 2 =
        # transient fetch trouble (warn-only by design). ANY other code — 127
        # (python missing), 137 (OOM-kill), a crash before the classifier ran —
        # previously fell through GREEN: a dead watcher reading as healthy.
        if: github.event_name != 'pull_request' && !contains(fromJSON('["0","1","2"]'), steps.check.outputs.exit)
        env:
          CODE: ${{ steps.check.outputs.exit }}
        run: |
          echo "::error::check_upstream_drift.py exited with unexpected code '${CODE}'"
          exit 1
